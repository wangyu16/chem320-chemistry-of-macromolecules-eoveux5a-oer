<script data-orz-asset="config">window.__ORZ_PAGED__ = {"mode":"cdn","katexCss":"https://cdn.jsdelivr.net/npm/katex@0.16.35/dist/katex.min.css","hljsCss":"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css","enhancers":{"mermaidJs":"https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js","smilesJs":"https://unpkg.com/smiles-drawer@1.0.10/dist/smiles-drawer.min.js","chartJs":"https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js","hljsJs":"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"},"version":"0.6.1","templates":[{"id":"article-page","label":"Article — title page","description":"Academic paper with a dedicated title page, then abstract + body.","group":"Article","skeleton":"{{nyml\nkind: document\ntemplate: article-page\nfront_matter: clean\n}}\n\n{{nyml\nkind: article-title\ntitle: Your Article Title\nsubtitle: A Concise, Descriptive Subtitle\nauthors: |\n  First Author | 1,* | first.author@example.edu | 0000-0002-1825-0097\n  Second Author | 2 | second.author@example.org\n  Third Author | 1,2\naffiliations: |\n  1: Department of Example, University of Example\n  2: Institute of Example, Example City\nnotes: |\n  *: Corresponding author\ndate: Month Year\nplacement: page\n}}\n\n{{nyml\nkind: abstract\ntext: Briefly state the problem, what you did, and what you found. Summarize your main contribution in one or two sentences. Close with the significance of the result for the field.\nkeywords: keyword one, keyword two, keyword three\nplacement: page\n}}\n\n## Introduction\n\nOpen with the context and motivation for your work. State the gap your study\naddresses and the question you set out to answer. End the section with a short\nstatement of your contribution and an outline of what follows.\n\n## Methods\n\nDescribe your approach so that a reader could reproduce it. Summarize the key\nparameters of your setup in a compact table:\n\n| Parameter | Symbol | Value |\n|---|---|---|\n| Sample size | $n$ | 120 |\n| Trials per group | $k$ | 5 |\n| Significance level | $\\alpha$ | 0.05 |\n\nQuantities are reported with their uncertainties, and the mass–energy relation\n$E = mc^2$ is used where relevant. The core model is given by\n\n$$\n\\hat{y} = \\beta_0 + \\sum_{i=1}^{n} \\beta_i x_i + \\varepsilon\n$$\n\nwhere the residual term $\\varepsilon$ is assumed normally distributed.\n\n## Results\n\n- The primary measure improved by 18% over the baseline.\n- The effect held across all three experimental groups.\n- Results were statistically significant ($p < 0.05$).\n\n## Conclusion\n\nRestate the main finding, note its limitations, and point to one direction for\nfuture work.\n\n## References\n\n1. Author Name. *Title of the First Reference.* Journal Name, Year, pp. 1–10.\n2. Author Name. *Title of the Second Reference.* Publisher, Year.\n"},{"id":"article-section","label":"Article — title section","description":"Academic paper with an inline title block above the body.","group":"Article","skeleton":"{{nyml\nkind: document\ntemplate: article-section\n}}\n\n{{nyml\nkind: article-title\ntitle: Your Article Title Goes Here\nsubtitle: A short, descriptive subtitle for your paper\nauthors: |\n  First Author | 1,* | first.author@example.edu | 0000-0002-1825-0097\n  Second Author | 2\naffiliations: |\n  1: Department of Example, University of Example\n  2: Institute of Example, Example City\nnotes: |\n  *: Corresponding author\ndate: June 2026\nplacement: section\n}}\n\n{{nyml\nkind: abstract\ntext: |\n  Summarize your work in two or three sentences. State the problem you\n  address, the approach you took, and the headline result a reader should\n  remember. Keep it self-contained so it makes sense without the body.\nkeywords: keyword one, keyword two, keyword three\n}}\n\n## Introduction\n\nOpen with the context and motivation for your work. Describe the gap or open\nquestion your study addresses, and end the section by stating your contribution\nin one or two clear sentences. Replace this placeholder text with your own.\n\nYou can cite prior work informally here and expand on it in the References\nsection below. Aim for a paragraph or two that orients the reader before the\nmethods.\n\n## Methods\n\nDescribe your approach so that it could be reproduced. Inline math renders with\nsingle dollar signs — for example, the sample size $n = 120$ and a significance\nthreshold of $\\alpha = 0.05$.\n\nThe table below is a placeholder; replace the rows with your own conditions.\n\n| Condition | Parameter | Value |\n|-----------|-----------|-------|\n| Baseline  | rate      | 0.10  |\n| Treatment | rate      | 0.42  |\n| Control   | rate      | 0.09  |\n\nDisplay equations use double dollar signs and are centered on their own line:\n\n$$\n\\bar{x} = \\frac{1}{n} \\sum_{i=1}^{n} x_i\n$$\n\nExplain each symbol in the surrounding text so the equation is self-explanatory.\n\n## Results\n\nSummarize your findings as a short list, then expand on the most important ones\nin prose if needed.\n\n- The treatment condition outperformed the baseline by a wide margin.\n- The effect held across all three replicates.\n- No significant difference was observed between the control and baseline.\n\n## Conclusion\n\nRestate your main finding and its significance in plain language. Note the key\nlimitations of the study and suggest one or two concrete directions for future\nwork. Close with a sentence that leaves the reader with your central takeaway.\n\n## References\n\n1. Author, A. B., & Author, C. D. (Year). *Title of the first referenced work.*\n   Journal or Publisher, volume(issue), pages.\n2. Author, E. F. (Year). *Title of the second referenced work.* Journal or\n   Publisher, volume(issue), pages.\n"},{"id":"report-page","label":"Report — title page","description":"Business/technical report with a cover page, TOC, then body.","group":"Report","skeleton":"{{nyml\nkind: document\ntemplate: report-page\nheader_center: Report Title\nfooter_left: Confidential\npage_number_position: footer-right\npage_number_style: page-n-of-N\nfront_matter: clean\n}}\n\n{{nyml\nkind: report-title\ntitle: Report Title\nsubtitle: A short, descriptive subtitle\nauthor: Team / Author\ndate: Q3 2026\nplacement: page\n}}\n\n{{nyml\nkind: toc\ntitle: Contents\nmax_level: 2\nplacement: page\n}}\n\n## Executive Summary\n\nThis report summarizes the key findings and recommendations for the quarter. In\none or two sentences, state the headline outcome and the decision you are asking\nthe reader to make. Replace this paragraph with a concise overview that a busy\nstakeholder can read in under a minute.\n\n## Background\n\nDescribe the context and why this work was undertaken. Reference the original\ngoal, the time period covered, and any prior reports this one builds on. Keep it\nbrief — enough for a new reader to understand the rest of the document without\nprior knowledge.\n\n## Findings\n\nThe data below summarizes performance against the targets set at the start of\nthe period.\n\n| Metric          | Target | Actual | Status      |\n|-----------------|--------|--------|-------------|\n| Revenue         | $1.2M  | $1.35M | On track    |\n| New customers   | 250    | 218    | Below plan  |\n| Churn rate      | 4.0%   | 3.2%   | Ahead       |\n| Support tickets | 1,000  | 1,140  | Watch       |\n\nOverall results were mixed: revenue and retention exceeded expectations, while\nnew-customer acquisition fell short of plan. Summarize the most important\ntakeaway in a sentence here.\n\n::: page-break\n:::\n\n## Recommendations\n\nBased on the findings above, we recommend the following actions:\n\n1. Increase top-of-funnel marketing spend to close the new-customer gap.\n2. Invest in support tooling to absorb rising ticket volume without adding cost.\n3. Maintain the retention initiatives that drove the lower churn rate.\n\n## Next Steps\n\n- Assign an owner and a due date to each recommendation.\n- Review progress at the next quarterly checkpoint.\n- Circulate this report to stakeholders for feedback by end of week.\n"},{"id":"report-section","label":"Report — title section","description":"Business/technical report with an inline title block.","group":"Report","skeleton":"{{nyml\nkind: document\ntemplate: report-section\nheader_center: Report Title\npage_number_position: footer-right\npage_number_style: page-n-of-N\n}}\n\n{{nyml\nkind: report-title\ntitle: Report Title\nsubtitle: A Short, Descriptive Subtitle\nauthor: Author Name, Team or Department\ndate: Month Year\nplacement: section\n}}\n\n{{nyml\nkind: toc\ntitle: Contents\nmax_level: 2\n}}\n\n## Executive Summary\n\nSummarize the report in a few sentences for a reader who will not go further.\nState the purpose of the work, the most important finding, and the single action\nyou are recommending. Keep this to a short paragraph that a busy decision-maker\ncan absorb at a glance.\n\nThis section should make sense on its own. Lead with the conclusion, then let the\nrest of the report supply the supporting detail.\n\n## Background\n\nExplain the context that prompted this report. Describe the situation, the problem\nor opportunity, and why it matters now. Note any relevant history, prior decisions,\nor constraints that shape the analysis.\n\nState the scope clearly: what this report covers and, where useful, what it\ndeliberately leaves out. Briefly describe how the information was gathered (for\nexample, interviews, system metrics, or a review of existing documents).\n\n## Findings\n\nThe analysis surfaced the following key results. Each finding is stated with its\nobserved impact and current status.\n\n| # | Finding | Impact | Status |\n|---|---------|--------|--------|\n| 1 | Describe the first observation here. | High | Confirmed |\n| 2 | Describe the second observation here. | Medium | Confirmed |\n| 3 | Describe the third observation here. | Low | Needs review |\n\nAdd a sentence or two of interpretation after the table. Point out any patterns\nthat connect the findings, and flag anything that contradicts an initial\nassumption.\n\n## Recommendations\n\nBased on the findings above, we recommend the following actions, listed in\npriority order:\n\n1. **Recommendation one.** State the action and the outcome it is meant to\n   achieve. Name the owner if one is known.\n2. **Recommendation two.** Describe the change and the effort it requires.\n3. **Recommendation three.** Note any dependency on an earlier recommendation.\n\nEach recommendation should trace back to at least one finding so the reasoning is\neasy to follow.\n\n## Next Steps\n\nOutline how to move from recommendations to action over the coming weeks.\n\n- **This week:** Confirm priorities and assign an owner to each recommendation.\n- **This month:** Begin the highest-priority work and define success measures.\n- **Next quarter:** Review progress against the measures and adjust the plan.\n\nClose by naming a point of contact and the date of the next review.\n"},{"id":"exam-page","label":"Exam — cover page","description":"Exam with a cover/instructions page, then numbered questions.","group":"Exam","skeleton":"{{nyml\nkind: document\ntemplate: exam-page\npage_number_position: footer-center\npage_number_style: page-n-of-N\ndynamic_choices: |\n  answer-key: hide\n}}\n\n<!-- One source, two printouts: this is the student copy (answer-key: hide).\n     Switch to `answer-key: show` here — or use the editor's answer-key toggle —\n     to reveal the ✓ marks and model answers for the instructor key. -->\n\n\n{{nyml\nkind: exam-title\ntitle: Course Name — Exam 1\nsubtitle: Fall Term, October Date\nauthor: Instructor Name\nduration: 60 minutes\ntotal_points: 100 points\nstudent_fields: |\n  Name | Student ID | Score / 100\ninstructions: |\n  **Instructions.** Read each question carefully before answering.\n\n  - Answer all questions. Multiple-choice questions are worth 5 points each; open-response questions are worth the points indicated.\n  - For multiple-choice questions, circle the single best answer.\n  - For open-response questions, write your answer in the space provided. Show all work; partial credit is awarded for correct reasoning.\n  - No calculators, notes, or electronic devices are permitted unless otherwise stated. Do not turn the page until instructed.\nplacement: page\n}}\n\n{{nyml\nkind: question-mc\nn: 1\npts: 5 pts\nbody: Which of the following best describes the primary concept introduced in this unit?\noptions: |\n  A. The first plausible-sounding option.\n  B. The correct option that states the concept accurately.\n  C. A close but subtly incorrect option.\n  D. An option that is clearly unrelated.\nanswer: B\n}}\n\n{{nyml\nkind: question-mc\nn: 2\npts: 5 pts\nbody: Given the scenario above, what is the most likely outcome?\noptions: |\n  A. An outcome that contradicts the principle.\n  B. An outcome that ignores a key assumption.\n  C. The outcome consistent with the principle.\n  D. An outcome that is only true in a special case.\nanswer: C\n}}\n\n{{nyml\nkind: question-open\nn: 3\npts: 10 pts\nbody: Define the key term from this unit and explain, in two or three sentences, why it matters in practice.\nspace: 5cm\nanswer: A model answer briefly defines the term and gives one concrete reason it matters, demonstrating clear understanding of the concept.\n}}\n\n{{nyml\nkind: question-open\nn: 4\npts: 10 pts\nbody: Compare and contrast the two approaches discussed in class, giving one advantage and one limitation of each.\nspace: 5cm\nanswer: A model answer names both approaches, states one genuine advantage and one genuine limitation for each, and draws a clear comparison between them.\n}}\n"},{"id":"exam-section","label":"Exam — title section","description":"Exam with an inline header block, then numbered questions.","group":"Exam","skeleton":"{{nyml\nkind: document\ntemplate: exam-section\npage_number_position: footer-center\npage_number_style: page-n-of-N\ndynamic_choices: |\n  answer-key: hide\n}}\n\n{{nyml\nkind: exam-title\ntitle: Course Name — Midterm Exam\nsubtitle: Chapter 1–4 Assessment\nauthor: Instructor Name\nstudent_fields: |\n  Name | Student ID | Score / 100\nplacement: section\n}}\n\n<!-- This template leaves the exam-title `instructions:` field empty and puts the\n     instructions at the top of the content instead — either placement works. -->\n\n**Instructions.** Answer all questions in the space provided. Calculators are not\npermitted, and you have 60 minutes to complete this exam.\n\n{{nyml\nkind: question-mc\nn: 1\npts: 5 pts\nbody: Which of the following best describes the main concept covered in this section?\noptions: |\n  A. First plausible answer choice.\n  B. Second plausible answer choice.\n  C. Correct answer choice.\n  D. Fourth plausible answer choice.\nanswer: C\n}}\n\n{{nyml\nkind: question-mc\nn: 2\npts: 5 pts\nbody: Identify the term that matches the definition given in lecture.\noptions: |\n  A. Distractor term one.\n  B. Correct term.\n  C. Distractor term three.\n  D. Distractor term four.\nanswer: B\n}}\n\n{{nyml\nkind: question-open\nn: 3\npts: 10 pts\nbody: Explain the key idea in your own words and give one supporting example. Show all relevant reasoning.\nspace: 5cm\nanswer: A complete answer states the core principle, explains why it holds, and supports it with a concrete, correctly worked example. Full credit requires clear reasoning and an accurate example.\n}}\n"},{"id":"letter","label":"Letter","description":"Formal letter: letterhead, inside address, body, signature.","group":"Letter","skeleton":"{{nyml\nkind: document\ntemplate: letter\n}}\n\n{{nyml\nkind: letterhead\norganization: Your Organization\naddress: |\n  123 Main Street, Suite 400\n  Springfield, ST 00000\nemail: hello@your-organization.example\nphone: (555) 123-4567\n}}\n\nJune 29, 2026\n\n{{nyml\nkind: letter-inside-address\nto: Recipient Name\norganization: Recipient Organization\naddress: |\n  456 Market Avenue\n  Metropolis, ST 11111\n}}\n\nDear Recipient Name,\n\nI am writing to introduce Your Organization and to propose a brief conversation\nabout how we might work together. Open this paragraph by stating your purpose\nclearly and giving the reader a reason to keep reading.\n\nUse the middle of the letter to provide the supporting details. Explain the\nbackground, outline what you are asking for, and note any relevant dates or\ndeliverables. Keep each point concise so the entire letter fits comfortably on a\nsingle page.\n\nClose by stating the specific next step you would like the reader to take and\nhow best to reach you. Thank you for your time and consideration; I look forward\nto your reply.\n\n{{nyml\nkind: letter-signature\nfrom: Your Name\nclosing: Sincerely\ntitle: Your Title\n}}\n"},{"id":"cover-letter","label":"Cover letter","description":"Job cover letter: sender header, recipient, body, sign-off.","group":"Letter","skeleton":"{{nyml\nkind: document\ntemplate: cover-letter\n}}\n\n{{nyml\nkind: letterhead\norganization: Your Name\naddress: |\n  123 Main Street\n  Your City, ST 00000\nemail: your.name@email.com\nphone: (555) 123-4567\n}}\n\nJune 29, 2026\n\n{{nyml\nkind: letter-inside-address\nto: Hiring Manager\norganization: Company Name\naddress: |\n  456 Corporate Boulevard\n  Their City, ST 00000\n}}\n\nDear Hiring Manager,\n\nI am writing to apply for the Position Title role at Company Name, which I\ndiscovered through where you saw the listing. From the moment I read the job\ndescription, I was excited by the chance to bring my background in your field\nto a team known for what the company is known for. This opportunity aligns\nclosely with both my skills and the direction I want my career to take.\n\nIn my current role as Your Current Title at Current or Previous Employer, I\nhave delivered describe a concrete result or responsibility, sharpening my\nstrengths in skill one, skill two, and skill three. I am confident these\nexperiences map directly to what this position requires: name one or two key\nrequirements from the posting. I pride myself on trait or working style, and I\nconsistently turn ambiguous problems into measurable outcomes.\n\nI would welcome the opportunity to discuss how my experience can contribute to\nCompany Name's goals. Thank you for considering my application; I have attached\nmy resume for your review and would be glad to provide any additional\ninformation. I look forward to speaking with you and can be reached at the\nphone number or email above to arrange a conversation.\n\n{{nyml\nkind: letter-signature\nfrom: Your Name\nclosing: Sincerely\ntitle: Position Title or Profession\n}}\n"},{"id":"cv","label":"CV — classic","description":"Résumé: name/contact header and clean sectioned body.","group":"CV","skeleton":"{{nyml\nkind: document\ntemplate: cv\n}}\n\n{{nyml\nkind: cv-header\nfull_name: Your Name\ntitle: Job Title / Professional Tagline\ncontacts: |\n  you@example.com\n  City, Country\n  linkedin.com/in/you\n  +1 555 0100\n}}\n\n## Summary\n\nA short, punchy two-sentence pitch describing who you are and the value you\nbring. Highlight your specialty, years of experience, and the kind of impact you\nare known for.\n\n## Experience\n\n### Job Title — Company (2022–Present)\n\n- Led a key initiative that delivered a measurable result, e.g. increased\n  revenue, cut costs, or improved performance by a specific percentage.\n- Owned a project end to end, collaborating across teams to ship on time.\n- Mentored teammates and improved a process that the whole team relied on.\n\n### Previous Job Title — Earlier Company (2019–2022)\n\n- Built or maintained a core product or system used by many people.\n- Drove an improvement with a clear, quantified outcome.\n\n## Education\n\n### Degree, Field of Study — University Name (2019)\n\n## Skills\n\n- **Core:** Skill One, Skill Two, Skill Three\n- **Tools:** Tool One, Tool Two, Tool Three\n- **Other:** Languages, Certifications, Soft Skills\n"},{"id":"cv-modern","label":"CV — modern","description":"Accent name + rule, uppercase section labels, right-aligned dates, skill chips.","group":"CV","skeleton":"{{nyml\nkind: document\ntemplate: cv-modern\ncustom_css: |\n  /* CV — modern: left-aligned, accent-forward, right-aligned dates, skill chips.\n     Theme-aware via tokens (falls back when a token is unset). */\n  .orz-el-cv-header .orz-cv-header-inner.orz-bordered { border-bottom: 0; }\n  .orz-el-cv-header {\n    text-align: left;\n    border-bottom: 3px solid var(--accent, #2b6cb0);\n    padding-bottom: 0.5em;\n    margin-bottom: 1.2em;\n  }\n  .orz-el-cv-header .orz-cv-top { justify-content: flex-start; }\n  .orz-el-cv-header .orz-cv-name { font-size: 2.3em; letter-spacing: -0.015em; }\n  .orz-el-cv-header .orz-cv-title { color: var(--text-muted, #666); font-size: 1.05em; }\n  .orz-el-cv-header .orz-cv-contacts { justify-content: flex-start; gap: 0.3em 1.1em; }\n  .orz-doc.markdown-body h2 {\n    font-size: 0.9em;\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n    color: var(--accent, #2b6cb0);\n    border-bottom: 0;\n    margin: 1.5em 0 0.5em;\n  }\n  .orz-doc.markdown-body h3 {\n    font-size: 1.06em;\n    margin: 0.7em 0 0.05em;\n    border-bottom: 0;\n  }\n  .orz-doc.markdown-body h3 + p { color: var(--text-muted, #555); font-style: italic; margin: 0 0 0.35em; }\n  .cv-date {\n    float: right;\n    font-weight: 400;\n    color: var(--text-muted, #777);\n    font-size: 0.88em;\n  }\n  .cv-chip {\n    display: inline-block;\n    background: var(--surface-2, #f0f2f5);\n    border: 1px solid var(--border, #e2e6ea);\n    border-radius: 999px;\n    padding: 0.12em 0.7em;\n    margin: 0.18em 0.25em 0.18em 0;\n    font-size: 0.85em;\n  }\n}}\n\n{{nyml\nkind: cv-header\nfull_name: Your Name\ntitle: Job Title / Professional Tagline\ncontacts: |\n  you@example.com\n  City, Country\n  linkedin.com/in/you\n  +1 555 0100\nsummary: Two-sentence pitch — who you are and the value you bring. Lead with your specialty and the kind of impact you are known for.\n}}\n\n## Experience\n\n### Senior Role {{span[cv-date] 2022 – Present}}\n\nCompany Name, City\n\n- Led a key initiative that delivered a measurable result (e.g. +X% revenue, −Y% cost).\n- Owned a project end to end, collaborating across teams to ship on time.\n- Mentored teammates and improved a process the whole team relied on.\n\n### Earlier Role {{span[cv-date] 2019 – 2022}}\n\nPrevious Company, City\n\n- Built or maintained a core product used by many people.\n- Drove an improvement with a clear, quantified outcome.\n\n## Education\n\n### Degree, Field of Study {{span[cv-date] 2015 – 2019}}\n\nUniversity Name, City\n\n## Skills\n\n{{span[cv-chip] Skill One}} {{span[cv-chip] Skill Two}} {{span[cv-chip] Skill Three}} {{span[cv-chip] Skill Four}} {{span[cv-chip] Skill Five}} {{span[cv-chip] Skill Six}}\n"},{"id":"cv-elegant","label":"CV — elegant","description":"Centered, letter-spaced name, hairline rules, two-column \"ledger\" entries.","group":"CV","skeleton":"{{nyml\nkind: document\ntemplate: cv-elegant\ncustom_css: |\n  /* CV — elegant: centered, letter-spaced name between hairlines, centered\n     small-caps section headers, borderless two-column \"ledger\" entries (years |\n     detail) that flow across pages. Theme-aware via tokens. */\n  .orz-el-cv-header .orz-cv-header-inner.orz-bordered { border-bottom: 0; }\n  .orz-el-cv-header {\n    text-align: center;\n    border-top: 1px solid var(--border-soft, #ddd);\n    border-bottom: 1px solid var(--border-soft, #ddd);\n    padding: 0.8em 0;\n    margin-bottom: 1.4em;\n  }\n  .orz-el-cv-header .orz-cv-top { justify-content: center; }\n  .orz-el-cv-header .orz-cv-name {\n    font-weight: 400;\n    text-transform: uppercase;\n    letter-spacing: 0.16em;\n    font-size: 1.85em;\n    color: var(--text-main, #222);\n  }\n  .orz-el-cv-header .orz-cv-title { font-style: italic; color: var(--text-muted, #666); }\n  .orz-el-cv-header .orz-cv-contacts { justify-content: center; font-size: 0.85em; gap: 0.3em 1em; }\n  .orz-doc.markdown-body h2 {\n    text-align: center;\n    font-size: 1em;\n    font-weight: 600;\n    text-transform: uppercase;\n    letter-spacing: 0.2em;\n    color: var(--text-main, #222);\n    border-bottom: 0;\n    margin: 1.7em 0 0.7em;\n  }\n  .orz-doc.markdown-body h2::after {\n    content: \"\";\n    display: block;\n    width: 2.5em;\n    height: 1px;\n    background: var(--accent, #999);\n    margin: 0.5em auto 0;\n  }\n  .orz-doc.markdown-body table { width: 100%; border: 0; margin: 0.2em 0; }\n  .orz-doc.markdown-body thead { display: none; }\n  .orz-doc.markdown-body td {\n    border: 0;\n    border-bottom: 1px solid var(--border-soft, #eee);\n    padding: 0.5em 0.4em;\n    vertical-align: top;\n  }\n  .orz-doc.markdown-body td:first-child {\n    white-space: nowrap;\n    width: 9em;\n    text-align: right;\n    color: var(--text-muted, #777);\n    font-variant: small-caps;\n    font-size: 0.92em;\n  }\n  .orz-doc.markdown-body .cv-skills { text-align: center; font-size: 0.95em; line-height: 1.9; }\n}}\n\n{{nyml\nkind: cv-header\nfull_name: Your Name\ntitle: Job Title / Professional Tagline\ncontacts: |\n  you@example.com\n  City, Country\n  linkedin.com/in/you\n}}\n\nA one-sentence profile, set centered and understated, introducing who you are and the work you do.\n{{attrs[class=\"cv-skills\"]}}\n\n## Experience\n\n| Years | Detail |\n|---|---|\n| 2022 – Present | **Senior Role**, Company Name — led the team and shipped a measurable result. |\n| 2019 – 2022 | **Earlier Role**, Previous Company — built a core product used by many. |\n| 2016 – 2019 | **First Role**, First Employer — delivered an improvement with a clear outcome. |\n\n## Education\n\n| Years | Detail |\n|---|---|\n| 2015 – 2019 | **Degree, Field of Study** — University Name, City. |\n\n## Skills\n\nSkill One · Skill Two · Skill Three · Skill Four · Skill Five · Skill Six\n{{attrs[class=\"cv-skills\"]}}\n"},{"id":"note","label":"Note","description":"Clean readable note: minimal furniture on A4.","group":"Note","skeleton":"{{nyml\nkind: document\ntemplate: note\n}}\n\n# Note Title\n\nWrite a one-line statement of what this note is about. Keep the opening short\nso a reader knows the purpose before reaching the details below.\n\n## Section\n\nReplace this with the main point of the note in two or three sentences. Add any\ncontext a reader needs to follow along. Keep each idea tight and to the point.\n\n- First key item to remember.\n- Second key item, with a short detail.\n- Third key item.\n\n::: info\nA short note callout for a tip, reminder, or aside worth setting apart.\n:::\n\n## Next Steps\n\n- [ ] First action to take.\n- [ ] Second action to take.\n- [ ] Third action to take.\n"}]};</script>
<script data-orz-asset="app">/* orz-paged in-file editor (A4). Plain browser JS, inlined into every
 * .paged.html. The rendered pages are the live preview: editing re-assembles +
 * re-paginates them (debounced). Save is self-reproducing — it serializes the
 * whole document with the edited source baked back into #orz-src, stripping
 * runtime-injected nodes ([data-orz-runtime]) and the rendered pages so the saved
 * file re-renders cleanly on next open. Ported in spirit from orz-mdhtml/slides.
 */
(function () {
  'use strict';
  var CM_BASE = 'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16';
  var cm = null;
  var rerenderTimer = null;
  var dirty = false; // edit-state, surfaced to an embedding host (orz-host-dirty)

  function $(id) { return document.getElementById(id); }
  function api() { return window.orzpaged; }
  function srcEl() { return $('orz-src'); }
  function currentSource() { return cm ? cm.getValue() : (srcEl() ? srcEl().textContent.replace(/^\n/, '').replace(/\n\s*$/, '') : ''); }

  function toast(msg) {
    var t = $('orz-toast'); if (!t) return;
    t.textContent = msg; t.classList.add('show');
    setTimeout(function () { t.classList.remove('show'); }, 1800);
  }

  /* ---- load CodeMirror on demand ---- */
  function loadCss(href) {
    if (document.querySelector('link[href="' + href + '"]')) return;
    var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = href;
    l.setAttribute('data-orz-runtime', '1'); document.head.appendChild(l);
  }
  function loadJs(src) {
    return new Promise(function (resolve, reject) {
      if (document.querySelector('script[data-cm="' + src + '"]')) return resolve();
      var s = document.createElement('script'); s.src = src; s.async = false;
      s.setAttribute('data-cm', src); s.setAttribute('data-orz-runtime', '1');
      s.onload = resolve; s.onerror = reject; document.head.appendChild(s);
    });
  }
  function ensureCodeMirror() {
    if (window.CodeMirror) return Promise.resolve();
    loadCss(CM_BASE + '/codemirror.min.css');
    return loadJs(CM_BASE + '/codemirror.min.js')
      .then(function () { return loadJs(CM_BASE + '/mode/markdown/markdown.min.js'); });
  }

  function pagesEl() { return $('orz-pages'); }
  function isEdit() { return document.documentElement.getAttribute('data-mode') === 'edit'; }

  /* ---- preview zoom-to-fit (side-by-side pane is narrower than an A4 page) ---- */
  function fitPreview() {
    var pages = pagesEl(); if (!pages) return;
    var wrap = pages.querySelector('.pagedjs_pages'); if (!wrap) return;
    if (!isEdit()) { wrap.style.zoom = ''; return; }
    wrap.style.zoom = '';                       // measure natural page width
    var page = pages.querySelector('.pagedjs_page');
    var pageW = page ? page.getBoundingClientRect().width : 0;
    if (!pageW) return;
    wrap.style.zoom = Math.min(1, (pages.clientWidth - 28) / pageW);
  }
  window.__orzPagedAfterRender = function () { fitPreview(); buildDynControls(); }; // engine calls this after every render

  /* ---- dynamic switch (live) — a control per key the document actually uses ---- */
  function humanizeKey(k) { return String(k).replace(/_/g, ' '); }
  function normKey(k) { return String(k).trim().toLowerCase().replace(/-/g, '_'); }

  function buildDynControls() {
    var host = $('orz-dyn'); if (!host) return;
    if (!api() || !api().getDynamicState) { host.innerHTML = ''; host.removeAttribute('data-keys'); return; }
    var st = api().getDynamicState();
    var opts = st.options || {}, choices = st.choices || {};
    // Only keys the CURRENT document actually uses (data-show-when / -hide-when),
    // so the control disappears when you switch to a template that has none.
    var keys = Object.keys(opts).sort();
    if (!keys.length) { host.innerHTML = ''; host.removeAttribute('data-keys'); return; }
    var sig = keys.join(',');
    if (host.getAttribute('data-keys') === sig) {            // same keys → just sync values
      keys.forEach(function (k) {
        var s = host.querySelector('select[data-key="' + k + '"]');
        if (s) s.value = choices[k] || '';
      });
      return;
    }
    host.setAttribute('data-keys', sig);
    host.innerHTML = '';
    keys.forEach(function (k) {
      var vals = (opts[k] || []).slice();
      var cur = choices[k] || '';
      if (cur && vals.indexOf(cur) < 0) vals.unshift(cur);   // keep the current value selectable
      var ctl = document.createElement('span'); ctl.className = 'orz-dyn-ctl';
      var lab = document.createElement('label'); lab.textContent = humanizeKey(k); lab.htmlFor = 'orz-dyn-' + k;
      var sel = document.createElement('select'); sel.id = 'orz-dyn-' + k; sel.setAttribute('data-key', k); sel.title = humanizeKey(k);
      vals.forEach(function (v) { var o = document.createElement('option'); o.value = v; o.textContent = v; sel.appendChild(o); });
      sel.value = cur;
      // Write the choice back into the source's `dynamic_choices` block so the
      // dropdown and the nyml stay in sync (and editing the nyml drives the dropdown).
      sel.addEventListener('change', function () { applyDynChoiceToSource(k, sel.value); });
      ctl.appendChild(lab); ctl.appendChild(sel); host.appendChild(ctl);
    });
  }

  /** Set `key: value` inside the document block's `dynamic_choices:` map, matching
   *  the key by normalized form (so `answer-key` and `answer_key` are the same). */
  function setSourceDynamicChoice(src, key, value) {
    key = normKey(key);
    var lines = src.split('\n');
    var dcIdx = -1, dcIndent = 0;
    for (var i = 0; i < lines.length; i++) {
      var m = lines[i].match(/^(\s*)dynamic_choices\s*:/);
      if (m) { dcIdx = i; dcIndent = m[1].length; break; }
    }
    if (dcIdx < 0) return null;                       // no block — nothing to sync
    for (var j = dcIdx + 1; j < lines.length; j++) {
      if (lines[j].trim() === '') continue;
      var lm = lines[j].match(/^(\s*)([A-Za-z][\w-]*)\s*:\s*(.*)$/);
      if (!lm || lm[1].length <= dcIndent) break;     // dedented / not a key → end of block
      if (normKey(lm[2]) === key) { lines[j] = lm[1] + lm[2] + ': ' + value; return lines.join('\n'); }
    }
    var indent = ''; for (var s = 0; s < dcIndent + 2; s++) indent += ' ';
    lines.splice(dcIdx + 1, 0, indent + key.replace(/_/g, '-') + ': ' + value);
    return lines.join('\n');
  }

  function applyDynChoiceToSource(key, value) {
    var next = setSourceDynamicChoice(currentSource(), key, value);
    if (next == null) return;
    setDirty(true);
    if (cm) cm.setValue(next);
    else { var ta = $('orz-ta'); if (ta) ta.value = next; }
    syncSource();
    if (api() && api().refresh) api().refresh();
  }

  /* ---- draggable divider (relative width) ---- */
  function wireDivider() {
    var d = $('orz-divider'); if (!d || d.__wired) return; d.__wired = true;
    var dragging = false;
    d.addEventListener('mousedown', function (e) {
      dragging = true; d.classList.add('dragging'); e.preventDefault();
      document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      var pct = Math.max(20, Math.min(78, (e.clientX / window.innerWidth) * 100));
      document.documentElement.style.setProperty('--orz-split', pct + '%');
    });
    document.addEventListener('mouseup', function () {
      if (!dragging) return;
      dragging = false; d.classList.remove('dragging'); document.body.style.userSelect = '';
      if (cm) cm.refresh(); fitPreview();
    });
  }

  /* ---- proportional editor <-> preview scroll sync (toggleable) ---- */
  var syncLock = false;
  var syncEnabled = true;
  try { syncEnabled = localStorage.getItem('orz-paged-sync') !== '0'; } catch (e) {}
  function setSync(on) {
    syncEnabled = !!on;
    try { localStorage.setItem('orz-paged-sync', syncEnabled ? '1' : '0'); } catch (e) {}
    var b = $('orz-sync'); if (b) b.setAttribute('aria-pressed', syncEnabled ? 'true' : 'false');
  }
  function wireSync() {
    if (!cm || cm.__sync) return; cm.__sync = true;
    cm.on('scroll', function () {
      if (!syncEnabled || syncLock || !isEdit()) return;
      var info = cm.getScrollInfo(); var max = info.height - info.clientHeight;
      if (max <= 0) return;
      var pages = pagesEl(); var pmax = pages.scrollHeight - pages.clientHeight;
      syncLock = true; pages.scrollTop = (info.top / max) * pmax;
      setTimeout(function () { syncLock = false; }, 24);
    });
    pagesEl().addEventListener('scroll', function () {
      if (!syncEnabled || syncLock || !isEdit()) return;
      var pages = pagesEl(); var pmax = pages.scrollHeight - pages.clientHeight;
      if (pmax <= 0) return;
      var info = cm.getScrollInfo(); var max = info.height - info.clientHeight;
      syncLock = true; cm.scrollTo(null, (pages.scrollTop / pmax) * max);
      setTimeout(function () { syncLock = false; }, 24);
    });
  }

  /* ---- edit mode ---- */
  function enterEdit() {
    document.documentElement.setAttribute('data-mode', 'edit');
    checkVersion(); // edit view only — broad viewers never see the update banner
    wireDivider();
    // reflect the theme actually in effect (document theme or a prior override)
    var th = $('orz-theme');
    if (th && api() && api().getTheme) { var cur = api().getTheme(); if (cur) th.value = cur; }
    ensureCodeMirror().then(function () {
      if (!cm) {
        var ta = $('orz-ta');
        ta.value = currentSource();
        cm = window.CodeMirror.fromTextArea(ta, {
          mode: 'markdown', lineNumbers: true, lineWrapping: true, theme: 'default',
        });
        cm.on('change', scheduleRerender);
      }
      wireSync();
      setTimeout(function () { if (cm) { cm.refresh(); cm.focus(); } fitPreview(); }, 30);
      setTimeout(fitPreview, 260); // re-fit once the slide-in transition settles
    }).catch(function () { toast('Could not load the editor (offline?)'); });
  }
  function exitEdit() {
    document.documentElement.removeAttribute('data-mode');
    fitPreview();                  // clear zoom immediately
    setTimeout(fitPreview, 260);   // and again after the slide-out settles
  }

  function scheduleRerender() {
    setDirty(true);
    if (rerenderTimer) clearTimeout(rerenderTimer);
    rerenderTimer = setTimeout(function () {
      syncSource();
      if (api() && api().refresh) api().refresh();
    }, 500);
  }

  /** Keep #orz-src in sync with the editor (so refresh()/setTheme()/save use current text). */
  function syncSource() {
    var el = srcEl(); if (!el) return;
    el.textContent = '\n' + currentSource() + '\n';
  }

  /* ---- self-reproducing save ---- */
  function serialize() {
    syncSource();
    var clone = document.documentElement.cloneNode(true);
    clone.removeAttribute('data-mode');
    // strip runtime-injected nodes (fonts, libs, katex, CodeMirror assets)
    var rt = clone.querySelectorAll('[data-orz-runtime]');
    for (var i = 0; i < rt.length; i++) rt[i].parentNode.removeChild(rt[i]);
    // clear the rendered pages (the engine re-renders on load)
    var pages = clone.querySelector('#orz-pages'); if (pages) pages.innerHTML = '';
    // never bake in the (edit-only) update banner so a viewer can't see it
    var ub = clone.querySelector('#orz-update'); if (ub) { ub.classList.remove('show'); ub.removeAttribute('data-latest'); }
    // reset the editor host to a bare textarea (drop CodeMirror DOM)
    var host = clone.querySelector('#orz-editor-host');
    if (host) host.innerHTML = '<textarea id="orz-ta" spellcheck="false"></textarea>';
    // guard against a closing script tag inside the source breaking the file
    var src = clone.querySelector('#orz-src');
    if (src) src.textContent = src.textContent.replace(/<\/(script)/gi, '<\\/$1');
    return '<!DOCTYPE html>\n' + clone.outerHTML;
  }

  function suggestedName() {
    var t = (document.title || 'document').replace(/[^\w.-]+/g, '-');
    return t.replace(/\.paged$/, '') + '.paged.html';
  }

  /** Write `html` to disk; resolves true if saved in place (FS-Access), false if downloaded. */
  function persist(html) {
    if (window.showSaveFilePicker) {
      return window.showSaveFilePicker({
        suggestedName: suggestedName(),
        types: [{ description: 'paged HTML', accept: { 'text/html': ['.paged.html', '.html'] } }],
      }).then(function (handle) {
        return handle.createWritable().then(function (w) {
          return w.write(html).then(function () { return w.close(); });
        });
      }).then(function () { return true; });
    }
    downloadFile(html);
    return Promise.resolve(false);
  }
  function save() {
    // A hosting platform (verified handshake) receives the save instead of the
    // file system; the host acknowledges with orz-host-saved (see PROTOCOL.md).
    if (isHosted()) { hostSave(currentSource(), serialize()); return; }
    persist(serialize()).then(function (inPlace) { if (inPlace) { setDirty(false); toast('Saved'); } })
      .catch(function (e) { if (e && e.name !== 'AbortError') downloadFile(serialize()); });
  }
  function downloadFile(html) {
    var blob = new Blob([html], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = suggestedName();
    document.body.appendChild(a); a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
    toast('Downloaded a copy');
  }

  /* ---- host embedding (orz-host-save@1) ----
   * When a platform embeds this file in an iframe and announces the
   * orz-host-save protocol (spec: PROTOCOL.md in the orz-mdhtml repo), Save
   * posts the document to the host instead of touching the file system. Never
   * enabled without the host's hello; protocol messages are accepted only from
   * window.parent, and after the handshake only from the recorded host origin.
   * Message content is read as data, never evaluated. Export/PDF keeps working. */
  var HOST_PROTOCOL = 'orz-host-save';
  var HOST_VERSION = 1;
  var hostOrigin = null;    // recorded at handshake; null = unhosted
  var hostSaveTimer = null; // watchdog for a save awaiting acknowledgement

  function isHosted() { return hostOrigin !== null; }
  // An opaque embedder (sandboxed/srcdoc host) serializes as the string 'null',
  // which postMessage rejects as a targetOrigin — fall back to '*' (the payload
  // contains nothing the host doesn't already have).
  function hostTarget() { return hostOrigin && hostOrigin !== 'null' ? hostOrigin : '*'; }
  function hostPost(msg) { try { window.parent.postMessage(msg, hostTarget()); } catch (e) {} }
  function setDirty(d) {
    d = !!d;
    if (dirty === d) return;
    dirty = d;
    if (isHosted()) hostPost({ type: 'orz-host-dirty', protocol: HOST_PROTOCOL, version: HOST_VERSION, dirty: d });
  }
  function hostSave(src, html) {
    if (hostSaveTimer) return; // one save in flight at a time
    hostSaveTimer = setTimeout(function () {
      hostSaveTimer = null;
      toast('Save failed — no response from the host'); // document intact, still dirty
    }, 10000);
    hostPost({ type: 'orz-host-save', protocol: HOST_PROTOCOL, version: HOST_VERSION, source: src, html: html });
  }
  function onHostMessage(event) {
    // only the embedding parent may speak the protocol
    if (window.parent === window || event.source !== window.parent) return;
    var d = event.data;
    if (!d || typeof d !== 'object') return;
    // after the handshake, hold the parent to the origin it introduced itself with
    if (isHosted() && hostOrigin !== 'null' && event.origin !== hostOrigin) return;
    if (d.type === 'orz-host-hello' && d.protocol === HOST_PROTOCOL && typeof d.version === 'number' && d.version >= 1) {
      hostOrigin = event.origin;
      // reply with the highest version we support ≤ the host's (we speak only 1)
      hostPost({ type: 'orz-host-ready', protocol: HOST_PROTOCOL, version: HOST_VERSION, kind: 'paged' });
      if (dirty) hostPost({ type: 'orz-host-dirty', protocol: HOST_PROTOCOL, version: HOST_VERSION, dirty: true });
    } else if (d.type === 'orz-host-saved' && hostSaveTimer) {
      clearTimeout(hostSaveTimer); hostSaveTimer = null;
      if (d.ok) { setDirty(false); toast('Saved'); }
      else { toast('Save failed' + (d.error ? ' — ' + String(d.error) : '')); }
    }
  }
  // listen from script load so an early hello isn't missed
  window.addEventListener('message', onHostMessage);

  /* ---- framework self-update (checked only in edit view) ---- */
  // SECURITY: the update source is HARDCODED here, never read from the file's
  // config — so a tampered/forged file cannot redirect "Update" to fetch
  // attacker-controlled code. The host is fixed to jsDelivr over HTTPS, and the
  // exact URLs are shown to the user for confirmation before anything is fetched.
  // (This protects genuine files; a wholly-malicious file controls this code too —
  // see the security note in the README. Clicking Update trusts npm + jsDelivr.)
  var UPD = {
    host: 'https://cdn.jsdelivr.net/npm/',
    manifest: 'https://data.jsdelivr.com/v1/packages/npm/orz-paged-browser/resolved',
    enginePkg: 'orz-paged-browser',
    engineFile: 'orz-paged.browser.js',
    appPkg: 'orz-paged'
  };
  function CFG() { return window.__ORZ_PAGED__ || {}; }
  function isNewer(a, b) {
    var pa = String(a).split('.'), pb = String(b).split('.');
    for (var i = 0; i < 3; i++) { var x = parseInt(pa[i], 10) || 0, y = parseInt(pb[i], 10) || 0; if (x > y) return true; if (x < y) return false; }
    return false;
  }
  var versionChecked = false;
  function checkVersion() {
    if (versionChecked) return; versionChecked = true;
    var c = CFG(); if (!c.version) return;
    fetch(UPD.manifest).then(function (r) { return r.json(); }).then(function (j) {
      var latest = j && j.version;
      if (latest && isNewer(latest, c.version)) showUpdate(latest);
    }).catch(function () {});
  }
  function showUpdate(latest) {
    var bar = $('orz-update'); if (!bar) return;
    bar.querySelector('.upd-text').textContent =
      'Framework ' + latest + ' available (this file uses ' + CFG().version + ').';
    bar.setAttribute('data-latest', latest);
    bar.classList.add('show');
  }
  /** One-click update: re-fetch the engine bundle + app.js from the lockstep CDN
   *  at the latest version, re-inline them, bump the version, save, and reload. */
  function applyUpdate() {
    var bar = $('orz-update'); var latest = bar && bar.getAttribute('data-latest'); if (!latest) return;
    var engineUrl = UPD.host + UPD.enginePkg + '@' + latest + '/' + UPD.engineFile;
    var appUrl = UPD.host + UPD.appPkg + '@' + latest + '/assets/app.js';
    if (!window.confirm('Update the framework to ' + latest + '?\n\nThis downloads and runs code from:\n  ' + engineUrl + '\n  ' + appUrl + '\n\nOnly proceed if you trust this document and its publisher.')) return;
    toast('Downloading framework ' + latest + '…');
    Promise.all([
      fetch(engineUrl).then(function (r) { if (!r.ok) throw new Error('engine'); return r.text(); }),
      fetch(appUrl).then(function (r) { if (!r.ok) throw new Error('app'); return r.text(); }),
    ]).then(function (res) {
      var es = document.querySelector('script[data-orz-asset="engine"]');
      if (es) { if (es.getAttribute('src')) es.setAttribute('src', engineUrl); else es.textContent = res[0]; }
      var as = document.querySelector('script[data-orz-asset="app"]');
      if (as) as.textContent = res[1];
      var cs = document.querySelector('script[data-orz-asset="config"]');
      if (cs) { c.version = latest; cs.textContent = 'window.__ORZ_PAGED__ = ' + JSON.stringify(c) + ';'; }
      bar.classList.remove('show');
      return persist(serialize());
    }).then(function (inPlace) {
      if (inPlace === undefined) return;
      if (inPlace) { toast('Updated to ' + latest + ' — reloading…'); setTimeout(function () { location.reload(); }, 700); }
      else { toast('Updated copy downloaded — reopen it to use the new framework.'); }
    }).catch(function () { toast('Update failed — check your connection.'); });
  }

  /* ---- template picker ---- */
  function templates() { return (window.__ORZ_PAGED__ && window.__ORZ_PAGED__.templates) || []; }
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  var TPL_ACCENT = { Article: '#2962a4', Report: '#2f6fe0', Exam: '#9a2820', Letter: '#2e7d32', CV: '#7a3f9a', Note: '#b7791f' };
  function buildTemplateMenu() {
    var menu = $('orz-template-menu'); if (!menu || menu.getAttribute('data-built')) return;
    var list = templates(); if (!list.length) return;
    var html = '', lastGroup = '';
    for (var i = 0; i < list.length; i++) {
      var t = list[i];
      if (t.group !== lastGroup) { lastGroup = t.group; html += '<div class="tpl-group">' + esc(t.group) + '</div>'; }
      html += '<button type="button" class="tpl" data-i="' + i + '" style="--tpl-accent:' + (TPL_ACCENT[t.group] || '#2f6fe0') + '">'
        + '<span class="tpl-ic"></span>'
        + '<span class="tpl-meta"><span class="tpl-label">' + esc(t.label) + '</span>'
        + '<span class="tpl-desc">' + esc(t.description) + '</span></span></button>';
    }
    menu.innerHTML = html;
    menu.addEventListener('click', function (e) {
      var b = e.target.closest ? e.target.closest('.tpl') : null;
      if (!b) return;
      applyTemplate(list[+b.getAttribute('data-i')]);
      menu.hidden = true;
    });
    menu.setAttribute('data-built', '1');
  }
  function toggleTemplateMenu(show) {
    var menu = $('orz-template-menu'); if (!menu) return;
    if (show === undefined) show = menu.hidden;
    if (show) buildTemplateMenu();
    menu.hidden = !show;
  }
  function applyTemplate(t) {
    if (!t || !t.skeleton) return;
    var cur = currentSource().trim();
    var next = t.skeleton;
    // Preserve the old content in a comment so it's kept but inert (nyml blocks
    // inside a comment don't render). Neutralize any `-->` in it first, else the
    // first one would close the wrapper early and leak the rest back in.
    if (cur) next += '\n\n<!-- Previous content (kept below — edit or delete):\n\n'
      + cur.replace(/--+>/g, '--​>') + '\n-->\n';
    setDirty(true);
    if (cm) { cm.setValue(next); cm.focus(); }
    else { var ta = $('orz-ta'); if (ta) ta.value = next; syncSource(); if (api() && api().refresh) api().refresh(); }
    toast('Started from "' + t.label + '"');
  }

  /* ---- wire up ---- */
  function init() {
    var fab = $('orz-edit-fab'); if (fab) fab.addEventListener('click', enterEdit);
    var close = $('orz-close'); if (close) close.addEventListener('click', exitEdit);
    var exp = $('orz-export'); if (exp) exp.addEventListener('click', function () { if (api()) api().exportPdf(); });
    var sav = $('orz-save'); if (sav) sav.addEventListener('click', save);
    var tpl = $('orz-template'); if (tpl) tpl.addEventListener('click', function (e) { e.stopPropagation(); toggleTemplateMenu(); });
    document.addEventListener('click', function (e) {
      var menu = $('orz-template-menu'), btn = $('orz-template');
      if (menu && !menu.hidden && !menu.contains(e.target) && (!btn || !btn.contains(e.target))) menu.hidden = true;
    });
    var theme = $('orz-theme');
    if (theme) theme.addEventListener('change', function () { if (api() && api().setTheme) api().setTheme(theme.value); });
    var sync = $('orz-sync');
    if (sync) { setSync(syncEnabled); sync.addEventListener('click', function () { setSync(!syncEnabled); }); }
    var updApply = $('orz-upd-apply'); if (updApply) updApply.addEventListener('click', applyUpdate);
    var updDismiss = $('orz-upd-dismiss');
    if (updDismiss) updDismiss.addEventListener('click', function () { var u = $('orz-update'); if (u) u.classList.remove('show'); });
    var rz; window.addEventListener('resize', function () {
      if (!isEdit()) return; clearTimeout(rz);
      rz = setTimeout(function () { if (cm) cm.refresh(); fitPreview(); }, 120);
    });
    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && (e.key === 's' || e.key === 'S')) { e.preventDefault(); save(); }
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
